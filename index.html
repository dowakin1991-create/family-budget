<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бюджет НАСТЯ💞 & АНТОН💪</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1d1d1f;
            --text-secondary: #86868b; --accent: #007aff; --expense: #ff3b30; --income: #34c759;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-secondary: #8a8a8e;
        }
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); color: var(--text-main); margin: 0; transition: background-color 0.4s; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px 20px 40px; }
        
        /* Анімація Логотипу */
        .logo-wrap { 
            text-align: center; margin-top: 10px; margin-bottom: 20px; 
            animation: applePop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        .app-logo { 
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--card-bg); box-shadow: 0 12px 35px rgba(0,0,0,0.4); 
            background: #2c2c2e; 
        }

        /* Анімація Шапки */
        header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; 
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s both;
        }
        .names-title { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
        .theme-btn {
            background: var(--card-bg); border: none; border-radius: 50%; 
            width: 45px; height: 45px; font-size: 1.3rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .theme-btn:active { transform: scale(0.9); }

        /* Картка Балансу */
        .balance-card {
            background: var(--card-bg); border-radius: 32px; padding: 35px 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px;
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
        }
        .balance-amount { font-size: 3.5rem; font-weight: 800; margin: 5px 0; letter-spacing: -1.5px; }

        /* Кнопки Дій */
        .actions { 
            display: flex; gap: 15px; margin-bottom: 15px; 
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s both;
        }
        .btn { 
            flex: 1; padding: 20px; border-radius: 24px; border: none; font-weight: 800; 
            color: white; cursor: pointer; transition: transform 0.2s; font-size: 1.05rem; 
        }
        .btn:active { transform: scale(0.94); }
        .btn-expense { background: var(--expense); box-shadow: 0 8px 20px rgba(255, 59, 48, 0.3); }
        .btn-income { background: var(--income); box-shadow: 0 8px 20px rgba(52, 199, 89, 0.3); }

        /* Кнопка Камери */
        .camera-wrap { animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s both; }
        .btn-scan { 
            width: 100%; background: linear-gradient(135deg, #007aff, #0051af); 
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3); margin-bottom: 25px;
        }

        /* Звіт */
        .report-section { 
            background: var(--card-bg); border-radius: 32px; padding: 25px; 
            animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.7s both;
        }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; margin-top: 30px; }
        .bar { width: 12%; background: var(--expense); border-radius: 8px; position: relative; min-height: 5px; }
        .bar span { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 700; color: var(--text-secondary); }
        .day-label { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; color: var(--text-secondary); }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s ease; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); width: 100%; border-radius: 35px 35px 0 0; padding: 30px 25px 40px;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-sizing: border-box;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 25px; }
        .cat-btn { 
            background: var(--bg-color); padding: 15px 5px; border-radius: 22px; text-align: center; 
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; border: 2px solid transparent;
        }
        .cat-btn.selected { border-color: var(--accent); background: rgba(0, 122, 255, 0.1); }
        .cat-btn span { font-size: 1.8rem; display: block; margin-bottom: 5px; }

        @keyframes applePop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes slideUpFade {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="logo-wrap">
            <img id="mainLogo" alt="Логотип" class="app-logo" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
        </div>

        <header>
            <div class="names-title">НАСТЯ💞 & АНТОН💪</div>
            <button class="theme-btn" onclick="toggleTheme()">🌗</button>
        </header>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; margin-bottom: 8px;">Спільний баланс</div>
            <div class="balance-amount" id="balanceDisplay">0 ₴</div>
        </div>

        <div class="actions">
            <button class="btn btn-expense" onclick="openModal('expense')">➖ Витрата</button>
            <button class="btn btn-income" onclick="openModal('income')">➕ Дохід</button>
        </div>
        
        <div class="camera-wrap">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="alert('Фото завантажено! Функція розпізнавання чеків у розробці.')">
            <button class="btn btn-scan" onclick="document.getElementById('cameraInput').click()">📸 Сканувати чек</button>
        </div>

        <div class="report-section">
            <div style="font-weight: 800; font-size: 1.1rem;">Щотижневий звіт</div>
            <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">Аналітика за останні 7 днів</div>
            <div class="chart">
                <div class="bar" style="height: 40%;"><span>400</span><div class="day-label">Пн</div></div>
                <div class="bar" style="height: 65%;"><span>750</span><div class="day-label">Вт</div></div>
                <div class="bar" style="height: 30%;"><span>300</span><div class="day-label">Ср</div></div>
                <div class="bar" style="height: 95%;"><span>1.2k</span><div class="day-label">Чт</div></div>
                <div class="bar" style="height: 55%;"><span>550</span><div class="day-label">Пт</div></div>
                <div class="bar" style="height: 80%;"><span>900</span><div class="day-label">Сб</div></div>
                <div class="bar" style="height: 25%; background: var(--income);"><span>150</span><div class="day-label">Нд</div></div>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modalTitle" style="margin:0; font-weight: 800; font-size: 1.4rem;">Нова витрата</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:2rem; color:var(--text-secondary); padding: 0;">✕</button>
            </div>
            
            <input type="number" id="amountInput" placeholder="0" style="width:100%; border:none; background:none; font-size:4.5rem; font-weight:900; text-align:center; margin:25px 0; color:var(--text-main); outline:none;">
            
            <div id="catGrid" class="cat-grid">
                <div class="cat-btn" onclick="selectCat(this)"><span>🍎</span>Їжа</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>🍿</span>Кіно</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>🏠</span>Дім</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>🚗</span>Авто</div>
            </div>
            
            <button onclick="saveTransaction()" style="width:100%; background:var(--accent); color:white; border:none; padding:20px; border-radius:24px; font-weight:800; margin-top:25px; font-size:1.1rem; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);">ЗБЕРЕГТИ</button>
        </div>
    </div>

    <script>
        // РОЗУМНИЙ ЗАВАНТАЖУВАЧ ЛОГОТИПА
        (function loadLogo() {
            const logoEl = document.getElementById('mainLogo');
            const possiblePaths = [
                'IMG_9283.png', 
                'IMG_9283.PNG', 
                'img_9283.png',
                'https://raw.githubusercontent.com/dowakin1991-create/family-budget/main/IMG_9283.png',
                'https://raw.githubusercontent.com/dowakin1991-create/family-budget/main/IMG_9283.PNG'
            ];
            let attempt = 0;

            logoEl.onerror = function() {
                attempt++;
                if (attempt < possiblePaths.length) {
                    logoEl.src = possiblePaths[attempt];
                } else {
                    // Якщо жоден варіант не спрацював, ставимо красиву заглушку
                    logoEl.src = 'https://via.placeholder.com/110/2c2c2e/ffffff?text=LOGO';
                }
            };
            
            // Запускаємо першу спробу
            logoEl.src = possiblePaths[0];
        })();

        // Локальне збереження балансу
        let bal = localStorage.getItem('budget_total') ? parseFloat(localStorage.getItem('budget_total')) : 24500;
        let currentMode = 'expense';

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = bal.toLocaleString() + ' ₴';
            localStorage.setItem('budget_total', bal);
        }

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function openModal(mode) {
            currentMode = mode;
            document.getElementById('modalTitle').innerText = mode === 'income' ? 'Новий дохід' : 'Нова витрата';
            document.getElementById('catGrid').style.display = mode === 'income' ? 'none' : 'grid';
            
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('amountInput').value = '';
            
            document.getElementById('modal').classList.add('active');
            setTimeout(() => document.getElementById('amountInput').focus(), 300);
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function selectCat(element) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
        }

        function saveTransaction() {
            const val = parseFloat(document.getElementById('amountInput').value);
            if(val > 0) {
                if(currentMode === 'expense') bal -= val;
                else bal += val;
                updateUI();
            }
            closeModal();
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if(e.target === this) closeModal();
        });

        updateUI();
    </script>
</body>
</html>
