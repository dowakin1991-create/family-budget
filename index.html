<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бюджет НАСТЯ💞 & АНТОН💪</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1d1d1f;
            --text-secondary: #86868b; --accent: #007aff; --expense: #ff3b30; --income: #34c759;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-secondary: #8a8a8e;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.4s; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-wrap { text-align: center; margin-bottom: 25px; }
        .app-logo { 
            width: 130px; height: 130px; border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--card-bg); box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            background: #2c2c2e; /* Фон на випадок затримки завантаження */
        }

        .balance-card {
            background: var(--card-bg); border-radius: 30px; padding: 35px 20px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .balance-amount { font-size: 3.2rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }

        .actions { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 20px; border-radius: 22px; border: none; font-weight: 800; color: white; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.94); opacity: 0.8; }
        .btn-expense { background: var(--expense); }
        .btn-income { background: var(--income); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-sizing: border-box;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 25px; }
        .cat-btn { background: var(--bg-color); padding: 15px 5px; border-radius: 20px; text-align: center; font-size: 0.8rem; cursor: pointer; }
        .cat-btn span { font-size: 1.8rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="font-weight: 900; font-size: 1.2rem; letter-spacing: -0.5px;">НАСТЯ💞 & АНТОН💪</div>
            <button onclick="toggleTheme()" style="background:var(--card-bg); border:none; border-radius:50%; width:45px; height:45px; font-size:1.3rem;">🌗</button>
        </header>

        <div class="logo-wrap">
            <img src="IMG_9283.png" alt="Logo" class="app-logo" id="mainLogo">
        </div>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.95rem; font-weight: 600;">Спільний бюджет</div>
            <div class="balance-amount" id="balanceDisplay">24 500 ₴</div>
        </div>

        <div class="actions">
            <button class="btn btn-expense" onclick="openModal('expense')">➖ Витрата</button>
            <button class="btn btn-income" onclick="openModal('income')">➕ Дохід</button>
        </div>
        
        <button class="btn" style="background:var(--accent); width:100%;" onclick="alert('Камера готується до запуску... 📸')">📸 Сканувати чек</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modalTitle" style="margin:0; font-weight: 800;">Нова витрата</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:2.5rem; color:var(--text-secondary)">✕</button>
            </div>
            <input type="number" id="amountInput" placeholder="0" style="width:100%; border:none; background:none; font-size:4.5rem; font-weight:900; text-align:center; margin:30px 0; color:var(--text-main); outline:none;">
            
            <div id="catGrid" class="cat-grid">
                <div class="cat-btn" onclick="save(this)"><span>🍎</span>Їжа</div>
                <div class="cat-btn" onclick="save(this)"><span>🍿</span>Кіно</div>
                <div class="cat-btn" onclick="save(this)"><span>🏠</span>Дім</div>
                <div class="cat-btn" onclick="save(this)"><span>🚗</span>Авто</div>
            </div>
            <button onclick="save()" style="width:100%; background:var(--accent); color:white; border:none; padding:22px; border-radius:25px; font-weight:900; margin-top:30px; font-size:1.1rem;">ЗБЕРЕГТИ</button>
        </div>
    </div>

    <script>
        // Спроба примусово оновити лого через JS, якщо воно не вантажиться
        window.onload = function() {
            const logo = document.getElementById('mainLogo');
            logo.src = 'IMG_9283.png?t=' + new Date().getTime();
        };

        let bal = localStorage.getItem('budget_v1') ? parseFloat(localStorage.getItem('budget_v1')) : 24500;
        let mode = 'expense';

        function sync() {
            document.getElementById('balanceDisplay').innerText = bal.toLocaleString() + ' ₴';
            localStorage.setItem('budget_v1', bal);
        }

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function openModal(m) {
            mode = m;
            document.getElementById('modalTitle').innerText = m === 'income' ? 'Новий дохід' : 'Нова витрата';
            document.getElementById('catGrid').style.display = m === 'income' ? 'none' : 'grid';
            document.getElementById('modal').classList.add('active');
            document.getElementById('amountInput').value = '';
            setTimeout(() => document.getElementById('amountInput').focus(), 300);
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function save() {
            const v = parseFloat(document.getElementById('amountInput').value);
            if(v > 0) {
                if(mode === 'expense') bal -= v;
                else bal += v;
                sync();
            }
            closeModal();
        }

        sync();
    </script>
</body>
</html>
