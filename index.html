<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бюджет НАСТЯ💞 & АНТОН💪</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1d1d1f;
            --text-secondary: #86868b; --accent: #007aff; --expense: #ff3b30; --income: #34c759;
            --modal-overlay: rgba(0, 0, 0, 0.4);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-secondary: #8a8a8e;
            --modal-overlay: rgba(0, 0, 0, 0.8);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.4s; overflow-x: hidden; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 40px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-wrap { text-align: center; margin-bottom: 25px; }
        .app-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .balance-card {
            background: var(--card-bg); border-radius: 28px; padding: 25px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .balance-amount { font-size: 2.8rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }

        .report-section { background: var(--card-bg); border-radius: 28px; padding: 20px; margin-top: 25px; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; margin-top: 25px; padding: 0 5px; }
        .bar { width: 12%; background: var(--expense); border-radius: 6px; position: relative; min-height: 5px; }
        .bar span { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 600; color: var(--text-secondary); }
        .day-label { position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }

        .actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; border: none; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.95); }
        .btn-expense { background: var(--expense); }
        .btn-income { background: var(--income); }

        /* Модальне вікно */
        .modal-overlay {
            position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(10px);
            display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); width: 100%; border-radius: 32px 32px 0 0; padding: 25px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-sizing: border-box;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
        .cat-btn {
            background: var(--bg-color); padding: 12px 5px; border-radius: 18px; text-align: center;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .cat-btn span { font-size: 1.6rem; display: block; margin-bottom: 4px; }
        .cat-btn:active { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px;">НАСТЯ💞 & АНТОН💪</div>
            <button onclick="toggleTheme()" style="background:var(--card-bg); border:none; border-radius: 50%; width: 40px; height: 40px; font-size:1.2rem; cursor:pointer;">🌗</button>
        </header>

        <div class="logo-wrap">
            <img src="IMG_9283.png" alt="Logo" class="app-logo" onerror="this.src='https://via.placeholder.com/120?text=Logo'">
        </div>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.85rem; font-weight: 600;">Поточний баланс</div>
            <div class="balance-amount">24 500 ₴</div>
            <div style="color: var(--income); font-weight: 700; font-size: 0.9rem;">+ 5 200 ₴ (цей тиждень)</div>
        </div>

        <div class="actions">
            <button class="btn btn-expense" onclick="openModal('expense')">➖ Витрата</button>
            <button class="btn btn-income" onclick="openModal('income')">➕ Дохід</button>
        </div>

        <div class="report-section">
            <div style="font-weight: 800; font-size: 1.1rem;">Щотижневий звіт</div>
            <div style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px;">Витрати за останні 7 днів</div>
            <div class="chart">
                <div class="bar" style="height: 40%;"><span>400</span><div class="day-label">Пн</div></div>
                <div class="bar" style="height: 65%;"><span>750</span><div class="day-label">Вт</div></div>
                <div class="bar" style="height: 30%;"><span>300</span><div class="day-label">Ср</div></div>
                <div class="bar" style="height: 95%;"><span>1.2k</span><div class="day-label">Чт</div></div>
                <div class="bar" style="height: 55%;"><span>550</span><div class="day-label">Пт</div></div>
                <div class="bar" style="height: 80%;"><span>900</span><div class="day-label">Сб</div></div>
                <div class="bar" style="height: 25%; background: var(--income);"><span>150</span><div class="day-label">Нд</div></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modalTitle" style="margin:0; font-size: 1.4rem;">Нова витрата</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:1.8rem; color:var(--text-secondary)">✕</button>
            </div>
            
            <input type="number" id="mainInput" placeholder="0 ₴" style="width:100%; border:none; background:none; font-size:3.5rem; font-weight:800; text-align:center; margin:25px 0; color:var(--text-main); outline:none;">
            
            <div id="catGrid" class="cat-grid">
                <div class="cat-btn" onclick="closeModal()"><span>🍎</span>Їжа</div>
                <div class="cat-btn" onclick="closeModal()"><span>🍿</span>Кіно</div>
                <div class="cat-btn" onclick="closeModal()"><span>☕</span>Кафе</div>
                <div class="cat-btn" onclick="closeModal()"><span>🏠</span>Дім</div>
                <div class="cat-btn" onclick="closeModal()"><span>🚗</span>Авто</div>
                <div class="cat-btn" onclick="closeModal()"><span>👕</span>Одяг</div>
                <div class="cat-btn" onclick="closeModal()"><span>💊</span>Ліки</div>
                <div class="cat-btn" onclick="closeModal()"><span>🎁</span>Інше</div>
            </div>
            <button onclick="closeModal()" style="width:100%; background:var(--accent); color:white; border:none; padding:18px; border-radius:20px; font-weight:700; margin-top:20px; font-size:1rem;">Зберегти</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
        function openModal(type) {
            const title = document.getElementById('modalTitle');
            const grid = document.getElementById('catGrid');
            if(type === 'income') {
                title.innerText = 'Новий дохід';
                grid.style.display = 'none';
            } else {
                title.innerText = 'Нова витрата';
                grid.style.display = 'grid';
            }
            document.getElementById('modal').classList.add('active');
            setTimeout(() => document.getElementById('mainInput').focus(), 300);
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
    </script>
</body>
</html>
