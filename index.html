<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бюджет НАСТЯ💞 & АНТОН💪</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1d1d1f;
            --text-secondary: #86868b; --accent: #007aff; --expense: #ff3b30; --income: #34c759;
            --modal-overlay: rgba(0, 0, 0, 0.4);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-secondary: #8a8a8e;
            --modal-overlay: rgba(0, 0, 0, 0.85);
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.4s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-wrap { text-align: center; margin-bottom: 25px; }
        .app-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .balance-card {
            background: var(--card-bg); border-radius: 28px; padding: 30px 20px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .balance-amount { font-size: 3rem; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }

        .actions { display: flex; gap: 12px; margin-bottom: 30px; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; border: none; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.95); }
        .btn-expense { background: var(--expense); }
        .btn-income { background: var(--income); }

        /* Модалка */
        .modal-overlay {
            position: fixed; inset: 0; background: var(--modal-overlay); backdrop-filter: blur(15px);
            display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--card-bg); width: 100%; border-radius: 32px 32px 0 0; padding: 30px 20px 40px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); box-sizing: border-box;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
        .cat-btn {
            background: var(--bg-color); padding: 12px 5px; border-radius: 18px; text-align: center;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 2px solid transparent;
        }
        .cat-btn.selected { border-color: var(--accent); background: rgba(0,122,255,0.1); }
        .cat-btn span { font-size: 1.6rem; display: block; margin-bottom: 4px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="font-weight: 800; font-size: 1.1rem;">НАСТЯ💞 & АНТОН💪</div>
            <button onclick="toggleTheme()" style="background:var(--card-bg); border:none; border-radius:50%; width:40px; height:40px; font-size:1.2rem;">🌗</button>
        </header>

        <div class="logo-wrap">
            <img src="IMG_9283.png?v=3" alt="Logo" class="app-logo" onerror="this.src='https://via.placeholder.com/120?text=Logo'">
        </div>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;">Спільний баланс</div>
            <div class="balance-amount" id="balanceDisplay">24 500 ₴</div>
        </div>

        <div class="actions">
            <button class="btn btn-expense" onclick="openModal('expense')">➖ Витрата</button>
            <button class="btn btn-income" onclick="openModal('income')">➕ Дохід</button>
        </div>
        <button class="btn" style="background:var(--accent); width:100%;" onclick="alert('Камера в розробці 📷')">📷 Сканувати чек</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="modalTitle" style="margin:0;">Нова витрата</h2>
                <button onclick="closeModal()" style="background:none; border:none; font-size:2rem; color:var(--text-secondary)">✕</button>
            </div>
            
            <input type="number" id="amountInput" placeholder="0" style="width:100%; border:none; background:none; font-size:4rem; font-weight:800; text-align:center; margin:20px 0; color:var(--text-main); outline:none;">
            
            <div id="catGrid" class="cat-grid">
                <div class="cat-btn" onclick="selectCat(this)"><span>🍎</span>Їжа</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>🍿</span>Кіно</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>☕</span>Кафе</div>
                <div class="cat-btn" onclick="selectCat(this)"><span>🏠</span>Дім</div>
            </div>
            
            <button onclick="processTransaction()" style="width:100%; background:var(--accent); color:white; border:none; padding:20px; border-radius:22px; font-weight:800; margin-top:25px; font-size:1.1rem;">Зберегти</button>
        </div>
    </div>

    <script>
        let balance = localStorage.getItem('familyBalance') ? parseFloat(localStorage.getItem('familyBalance')) : 24500;
        let currentType = 'expense';

        function updateDisplay() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + ' ₴';
            localStorage.setItem('familyBalance', balance);
        }

        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function openModal(type) {
            currentType = type;
            document.getElementById('modalTitle').innerText = type === 'income' ? 'Новий дохід' : 'Нова витрата';
            document.getElementById('catGrid').style.display = type === 'income' ? 'none' : 'grid';
            document.getElementById('modal').classList.add('active');
            document.getElementById('amountInput').value = '';
            setTimeout(() => document.getElementById('amountInput').focus(), 300);
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function selectCat(el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
        }

        function processTransaction() {
            const val = parseFloat(document.getElementById('amountInput').value);
            if(val > 0) {
                if(currentType === 'expense') balance -= val;
                else balance += val;
                updateDisplay();
            }
            closeModal();
        }

        updateDisplay(); // Запуск при старті
    </script>
</body>
</html>
