<!DOCTYPE html>
<html lang="uk" data-theme="dark-blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Together</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* БАЗОВІ ЗМІННІ ТА ТЕМИ */
        :root {
            /* Світлі теми */
            --bg-pink: #ffe6f2; --card-pink: #ffffff; --text-pink: #33001b;
            --bg-blue: #e6f2ff; --card-blue: #ffffff; --text-blue: #001b33;
            --bg-green: #e6ffe6; --card-green: #ffffff; --text-green: #003300;
            --bg-yellow: #ffffe6; --card-yellow: #ffffff; --text-yellow: #333300;
            
            /* Темні градієнти */
            --bg-dark-blue: linear-gradient(135deg, #000000, #001f3f);
            --bg-dark-red: linear-gradient(135deg, #000000, #3f0000);
            --bg-dark-green: linear-gradient(135deg, #000000, #002b0c);
            --bg-dark-orange: linear-gradient(135deg, #000000, #3f1a00);
            --card-dark: rgba(255, 255, 255, 0.1);
            --text-dark: #f5f5f7;

            --accent: #007aff;
            --font-main: 'Inter', sans-serif;
        }

        /* Застосування тем */
        [data-theme="light-pink"] { --bg-current: var(--bg-pink); --card-current: var(--card-pink); --text-current: var(--text-pink); }
        [data-theme="light-blue"] { --bg-current: var(--bg-blue); --card-current: var(--card-blue); --text-current: var(--text-blue); }
        [data-theme="light-green"] { --bg-current: var(--bg-green); --card-current: var(--card-green); --text-current: var(--text-green); }
        [data-theme="light-yellow"] { --bg-current: var(--bg-yellow); --card-current: var(--card-yellow); --text-current: var(--text-yellow); }
        
        [data-theme="dark-blue"] { --bg-current: var(--bg-dark-blue); --card-current: var(--card-dark); --text-current: var(--text-dark); }
        [data-theme="dark-red"] { --bg-current: var(--bg-dark-red); --card-current: var(--card-dark); --text-current: var(--text-dark); }
        [data-theme="dark-green"] { --bg-current: var(--bg-dark-green); --card-current: var(--card-dark); --text-current: var(--text-dark); }
        [data-theme="dark-orange"] { --bg-current: var(--bg-dark-orange); --card-current: var(--card-dark); --text-current: var(--text-dark); }

        body {
            font-family: var(--font-main); background: var(--bg-current); color: var(--text-current);
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            transition: background 0.5s ease, color 0.5s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* АРХІТЕКТУРА ЕКРАНІВ */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box;
            opacity: 0; pointer-events: none; transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); z-index: 10; }

        /* Елементи Інтерфейсу */
        h1 { font-weight: 900; font-size: 2.2rem; margin-bottom: 30px; letter-spacing: -1px; }
        
        .menu-btn {
            background: var(--card-current); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; font-size: 1.2rem; font-weight: 800;
            color: var(--text-current); cursor: pointer; text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.2s; display: flex; justify-content: space-between;
        }
        .menu-btn:active { transform: scale(0.95); }

        .back-btn { background: none; border: none; color: var(--text-current); font-size: 1.5rem; text-align: left; margin-bottom: 20px; padding: 0; cursor: pointer; }

        /* СПЛЕШ ЕКРАН */
        #screen-splash { justify-content: center; align-items: center; cursor: pointer; z-index: 100;}
        .big-logo { width: 180px; height: 180px; border-radius: 50%; box-shadow: 0 15px 40px rgba(0,0,0,0.5); margin-bottom: 40px; animation: float 3s ease-in-out infinite; }
        .tap-text { font-weight: 600; opacity: 0.7; animation: pulse 2s infinite; }

        /* НАЛАШТУВАННЯ */
        .setting-group { margin-bottom: 25px; background: var(--card-current); padding: 20px; border-radius: 20px; }
        .setting-title { font-size: 0.9rem; font-weight: 800; opacity: 0.7; margin-bottom: 15px; text-transform: uppercase; }
        
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .theme-dot { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-dot:active { transform: scale(0.8); }
        .theme-dot.active { border-color: var(--text-current); transform: scale(1.1); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="screen-splash" class="screen active" onclick="goToScreen('screen-main')">
        <img src="IMG_9283.png" alt="Logo" class="big-logo" onerror="this.src='https://via.placeholder.com/180/2c2c2e/ffffff?text=LOGO'">
        <div class="tap-text" id="lang-tap">Торкніться екрана</div>
    </div>

    <div id="screen-main" class="screen">
        <h1 id="lang-menu">Головне меню</h1>
        <button class="menu-btn" onclick="startNewBudget()">
            <span id="lang-new">➕ Новий спільний бюджет</span> <span>➔</span>
        </button>
        <button class="menu-btn" onclick="goToScreen('screen-projects')" id="btn-continue" style="display: none;">
            <span id="lang-cont">📂 Продовжити бюджет</span> <span>➔</span>
        </button>
        <button class="menu-btn" onclick="goToScreen('screen-settings')">
            <span id="lang-set">⚙️ Налаштування</span> <span>➔</span>
        </button>
    </div>

    <div id="screen-role" class="screen">
        <button class="back-btn" onclick="goToScreen('screen-main')">← Назад</button>
        <h1>Хто ти?</h1>
        <p style="opacity: 0.7; margin-top: -20px; margin-bottom: 30px;">Цей вибір збережеться на цьому телефоні назавжди.</p>
        <button class="menu-btn" style="justify-content: center; font-size: 1.5rem;" onclick="setRole('АНТОН💪')">Я АНТОН 💪</button>
        <button class="menu-btn" style="justify-content: center; font-size: 1.5rem;" onclick="setRole('НАСТЯ💞')">Я НАСТЯ 💞</button>
    </div>

    <div id="screen-projects" class="screen">
        <button class="back-btn" onclick="goToScreen('screen-main')">← Назад</button>
        <h1>Мої проекти</h1>
        <div id="projects-list">
            </div>
        <button class="menu-btn" style="border: 2px dashed rgba(255,255,255,0.3); background: transparent; justify-content: center;" onclick="createNewProject()">+ Створити ще один</button>
    </div>

    <div id="screen-settings" class="screen">
        <button class="back-btn" onclick="goToScreen('screen-main')">← Назад</button>
        <h1 id="lang-set-title">Налаштування</h1>
        
        <div class="setting-group">
            <div class="setting-title">Загальні</div>
            <div class="toggle-row">
                <span id="lang-sound">Звуки інтерфейсу</span>
                <input type="checkbox" id="soundToggle" checked onchange="toggleSound()" style="transform: scale(1.5);">
            </div>
            <div class="toggle-row">
                <span id="lang-lang">Мова (Укр / Eng)</span>
                <button onclick="toggleLang()" style="padding: 5px 15px; border-radius: 10px; border:none; font-weight:bold; cursor:pointer;" id="langBtn">УКР</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-title">Світлі теми</div>
            <div class="theme-grid">
                <div class="theme-dot" style="background: #ffe6f2;" onclick="setTheme('light-pink')"></div>
                <div class="theme-dot" style="background: #e6f2ff;" onclick="setTheme('light-blue')"></div>
                <div class="theme-dot" style="background: #e6ffe6;" onclick="setTheme('light-green')"></div>
                <div class="theme-dot" style="background: #ffffe6;" onclick="setTheme('light-yellow')"></div>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-title">Темні градієнти</div>
            <div class="theme-grid">
                <div class="theme-dot active" style="background: linear-gradient(135deg, #000, #001f3f);" onclick="setTheme('dark-blue')"></div>
                <div class="theme-dot" style="background: linear-gradient(135deg, #000, #3f0000);" onclick="setTheme('dark-red')"></div>
                <div class="theme-dot" style="background: linear-gradient(135deg, #000, #002b0c);" onclick="setTheme('dark-green')"></div>
                <div class="theme-dot" style="background: linear-gradient(135deg, #000, #3f1a00);" onclick="setTheme('dark-orange')"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. СТАН ДОДАТКУ
        let appData = JSON.parse(localStorage.getItem('budgetAppData')) || {
            userRole: null,
            projects: [],
            settings: { sound: true, lang: 'uk', theme: 'dark-blue' }
        };

        // 2. ІНІЦІАЛІЗАЦІЯ
        function initApp() {
            setTheme(appData.settings.theme);
            document.getElementById('soundToggle').checked = appData.settings.sound;
            updateLangUI();
            
            // Якщо є проекти, показуємо кнопку "Продовжити"
            if(appData.projects.length > 0) {
                document.getElementById('btn-continue').style.display = 'flex';
                renderProjects();
            }
        }

        // 3. ЗВУК (Генерація системного кліку)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playClick() {
            if(!appData.settings.sound) return;
            if(!audioCtx) audioCtx = new AudioContext();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 4. МАРШРУТИЗАЦІЯ (Перемикання екранів)
        function goToScreen(screenId) {
            playClick();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 5. ЛОГІКА РОЛЕЙ ТА ПРОЕКТІВ
        function startNewBudget() {
            if(!appData.userRole) {
                goToScreen('screen-role'); // Якщо вперше
            } else {
                createNewProject(); // Якщо вже знаємо хто це
            }
        }

        function setRole(role) {
            appData.userRole = role;
            saveData();
            createNewProject();
        }

        function createNewProject() {
            const projName = prompt("Введіть назву проекту (наприклад: 'Ремонт' або 'Квітень'):", "Новий бюджет");
            if(projName) {
                appData.projects.push({ id: Date.now(), name: projName, balance: 0 });
                saveData();
                renderProjects();
                document.getElementById('btn-continue').style.display = 'flex';
                goToScreen('screen-projects');
            }
        }

        function renderProjects() {
            const list = document.getElementById('projects-list');
            list.innerHTML = '';
            appData.projects.forEach(p => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.innerHTML = `<span>📁 ${p.name}</span> <span style="opacity:0.5; font-size:0.9rem;">Відкрити</span>`;
                btn.onclick = () => { playClick(); alert(`Відкриваємо панель для "${p.name}". (Розробимо на наступному кроці!)`); };
                list.appendChild(btn);
            });
        }

        // 6. НАЛАШТУВАННЯ
        function setTheme(themeName) {
            playClick();
            appData.settings.theme = themeName;
            document.documentElement.setAttribute('data-theme', themeName);
            
            // Візуальне виділення активної теми
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
            const activeDot = Array.from(document.querySelectorAll('.theme-dot')).find(d => d.getAttribute('onclick').includes(themeName));
            if(activeDot) activeDot.classList.add('active');
            saveData();
        }

        function toggleSound() {
            appData.settings.sound = document.getElementById('soundToggle').checked;
            playClick();
            saveData();
        }

        function toggleLang() {
            playClick();
            appData.settings.lang = appData.settings.lang === 'uk' ? 'en' : 'uk';
            updateLangUI();
            saveData();
        }

        const dict = {
            uk: { tap: "Торкніться екрана", menu: "Головне меню", new: "➕ Новий спільний бюджет", cont: "📂 Продовжити бюджет", set: "⚙️ Налаштування", setTitle: "Налаштування", sound: "Звуки інтерфейсу", lang: "Мова (Укр / Eng)" },
            en: { tap: "Tap to start", menu: "Main Menu", new: "➕ New Shared Budget", cont: "📂 Continue Budget", set: "⚙️ Settings", setTitle: "Settings", sound: "UI Sounds", lang: "Language (Ukr / Eng)" }
        };

        function updateLangUI() {
            const l = appData.settings.lang;
            document.getElementById('langBtn').innerText = l.toUpperCase();
            document.getElementById('lang-tap').innerText = dict[l].tap;
            document.getElementById('lang-menu').innerText = dict[l].menu;
            document.getElementById('lang-new').innerText = dict[l].new;
            document.getElementById('lang-cont').innerText = dict[l].cont;
            document.getElementById('lang-set').innerText = dict[l].set;
            document.getElementById('lang-set-title').innerText = dict[l].setTitle;
            document.getElementById('lang-sound').innerText = dict[l].sound;
            document.getElementById('lang-lang').innerText = dict[l].lang;
        }

        function saveData() { localStorage.setItem('budgetAppData', JSON.stringify(appData)); }

        // Запуск
        initApp();
    </script>
</body>
</html>
