<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бюджет НАСТЯ💞 & АНТОН💪</title>
    <style>
        :root {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #1d1d1f;
            --text-secondary: #86868b; --accent: #007aff; --expense: #ff3b30; --income: #34c759;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #f5f5f7; --text-secondary: #8a8a8e;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; transition: 0.4s; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-wrap { text-align: center; margin-bottom: 25px; animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .app-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .balance-card {
            background: var(--card-bg); border-radius: 28px; padding: 30px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .balance-amount { font-size: 2.8rem; font-weight: 800; margin: 5px 0; }

        /* Стилі для звіту */
        .report-section { background: var(--card-bg); border-radius: 28px; padding: 20px; margin-top: 25px; }
        .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; margin-top: 20px; padding: 0 10px; }
        .bar { width: 30px; background: var(--accent); border-radius: 8px 8px 4px 4px; position: relative; transition: height 1s ease; }
        .bar span { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-secondary); }
        .day-label { font-size: 10px; color: var(--text-secondary); text-align: center; margin-top: 8px; }

        .actions { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 18px; border-radius: 20px; border: none; font-weight: 700; color: white; cursor: pointer; }
        .btn-expense { background: var(--expense); }
        .btn-income { background: var(--income); }

        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div style="font-weight: 700;">НАСТЯ💞 & АНТОН💪</div>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:1.5rem;">🌗</button>
        </header>

        <div class="logo-wrap">
            <img src="IMG_9283.png" alt="Logo" class="app-logo" onerror="this.src='https://via.placeholder.com/120?text=Logo'">
        </div>

        <div class="balance-card">
            <div style="color: var(--text-secondary); font-size: 0.9rem;">Поточний баланс</div>
            <div class="balance-amount">24 500 ₴</div>
            <div style="color: var(--income); font-weight: 600;">+ 5 200 ₴ (цей тиждень)</div>
        </div>

        <div class="actions">
            <button class="btn btn-expense">➖ Витрата</button>
            <button class="btn btn-income">➕ Дохід</button>
        </div>

        <div class="report-section">
            <div style="font-weight: 700; margin-bottom: 5px;">Щотижневий звіт</div>
            <div style="color: var(--text-secondary); font-size: 0.8rem;">Витрати за останні 7 днів</div>
            <div class="chart">
                <div class="bar" style="height: 40%; background: var(--expense);"><span>400</span><div class="day-label" style="margin-top: 105px;">Пн</div></div>
                <div class="bar" style="height: 70%; background: var(--expense);"><span>750</span><div class="day-label" style="margin-top: 105px;">Вт</div></div>
                <div class="bar" style="height: 30%; background: var(--expense);"><span>300</span><div class="day-label" style="margin-top: 105px;">Ср</div></div>
                <div class="bar" style="height: 90%; background: var(--expense);"><span>1.2k</span><div class="day-label" style="margin-top: 105px;">Чт</div></div>
                <div class="bar" style="height: 50%; background: var(--expense);"><span>550</span><div class="day-label" style="margin-top: 105px;">Пт</div></div>
                <div class="bar" style="height: 85%; background: var(--expense);"><span>900</span><div class="day-label" style="margin-top: 105px;">Сб</div></div>
                <div class="bar" style="height: 20%; background: var(--income);"><span>150</span><div class="day-label" style="margin-top: 105px;">Нд</div></div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
